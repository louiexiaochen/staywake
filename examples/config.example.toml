# staywake config — copy to:
#   macOS:   ~/.config/staywake/config.toml
#   Windows: %APPDATA%\staywake\config.toml

[daemon]
# How often (seconds) the daemon polls all sources.
interval_seconds = 2.0

# A holder whose `updatedAt` is older than this is treated as dead.
stale_after_seconds = 600

# Stronger sleep blocking. On macOS toggles `pmset disablesleep` (root only);
# on Windows toggles the lid action via `powercfg` (admin only).
# Without aggressive, lid-close on AC may still trigger sleep.
aggressive = true


# ---------------------------------------------------------------------------
# Built-in monitors — auto-detect agent activity from transcript files.
#
# Defaults are intentionally generous: an agent that hasn't written for 30
# seconds is almost certainly still thinking. The shipped numbers come from
# CodeIsland's production tuning:
#
#   claude_code        300s  (5 min — Claude extended-thinking can pause
#                              several minutes between transcript writes)
#   codex               90s  (Codex turns are shorter but still bursty)
#
# Override per-name to disable or tune. If your workflow has even longer
# silent thinks (e.g. waiting on a manual approval), bump higher.
# ---------------------------------------------------------------------------

# [monitors.claude_code]
# enabled = true
# globs = ["~/.claude/projects/**/*.jsonl"]
# idle_after_seconds = 300

# [monitors.codex]
# enabled = true
# globs = ["~/.codex/sessions/**/rollout-*.jsonl"]
# idle_after_seconds = 90

# Add custom monitors. The name is arbitrary; ``globs`` and
# ``idle_after_seconds`` are required.
# [monitors.my_pipeline]
# globs = ["/var/log/my-agent/*.log"]
# idle_after_seconds = 120


# ---------------------------------------------------------------------------
# Optional: process-scan fallback. Useful for tools whose output you can't
# easily monitor by file mtime. Disabled by default; ships with no patterns.
# ---------------------------------------------------------------------------

[process_scan]
enabled = false
patterns = [
    # "\\bcodex\\b",
    # "\\bclaude\\b",
]
idle_patterns = [
    # "language-server",
    # "tsc --watch",
]
