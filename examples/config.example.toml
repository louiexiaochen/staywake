# staywake config — copy to:
#   macOS:   ~/.config/staywake/config.toml
#   Windows: %APPDATA%\staywake\config.toml

[daemon]
# How often (seconds) the daemon polls all sources.
interval_seconds = 2.0

# A holder whose `updatedAt` is older than this is treated as dead.
stale_after_seconds = 600

# Stronger sleep blocking. macOS: also toggles `pmset disablesleep` (root).
# Windows: also toggles the lid action via `powercfg` (admin).
# Without aggressive, lid-close on AC may still trigger sleep.
aggressive = true


# ---------------------------------------------------------------------------
# Built-in transcript monitors — auto-detect agent activity.
#
# These are ENABLED BY DEFAULT (no config needed). The defaults below are
# the same as the shipped values; uncomment only to tune or disable.
#
#   Threshold rationale (ported from CodeIsland production tuning):
#     monitoredThinkingTimeout       = 300 s   (Claude Code, pure-CLI agent)
#     nativeAppTranscriptQuietTimeout =  90 s   (embedded native-app agents)
# ---------------------------------------------------------------------------

# [monitors.claude_code]              # Anthropic Claude Code (CLI)
# enabled = true
# globs = ["~/.claude/projects/**/*.jsonl"]
# idle_after_seconds = 300

# [monitors.codex]                    # OpenAI Codex CLI
# enabled = true
# globs = ["~/.codex/sessions/**/rollout-*.jsonl"]
# idle_after_seconds = 90

# [monitors.cursor_agent]             # Cursor IDE agent
# enabled = true
# globs = ["~/.cursor/projects/**/agent-transcripts/*.jsonl"]
# idle_after_seconds = 90

# [monitors.qoder]                    # Qoder (Alibaba)
# enabled = true
# globs = ["~/.qoder/projects/**/transcript/*.jsonl"]
# idle_after_seconds = 90

# [monitors.codebuddy]                # CodeBuddy (Tencent)
# enabled = true
# globs = ["~/.codebuddy/projects/**/*.jsonl"]
# idle_after_seconds = 90


# ---------------------------------------------------------------------------
# Custom monitors — for any tool not in the builtin list. Same shape.
# Example: Aider's chat-history files.
# ---------------------------------------------------------------------------

# [monitors.aider]
# globs = ["~/.aider.chat.history.md", "~/**/.aider.chat.history.md"]
# idle_after_seconds = 120

# [monitors.my_orchestrator]
# globs = ["/var/log/my-pipeline/*.log"]
# idle_after_seconds = 60


# ---------------------------------------------------------------------------
# Process-scan fallback — for agents that don't write a transcript file
# (or where we don't know the path). Off by default. Setting
# `use_builtins = true` enables a curated set of patterns covering 16 agents
# CodeIsland tracks: Claude Code, Codex, Cursor, Qoder, CodeBuddy, OpenCode,
# Gemini CLI, GitHub Copilot CLI, Trae, Trae CN, CodeBuddy CN, Droid (Factory),
# StepFun, AntiGravity, WorkBuddy, Hermes, OpenWork.
# ---------------------------------------------------------------------------

[process_scan]
enabled = false
use_builtins = false   # set true to monitor every CLI/app in the curated list

# Add your own regex patterns on top of (or instead of) the builtins.
patterns = [
    # "\\bmy-private-agent\\b",
]

# Subtree filter: descendants whose `ps` line matches any of these are
# treated as idle (so dev servers / language servers don't keep you awake).
idle_patterns = [
    # "language-server",
    # "tsc --watch",
]
