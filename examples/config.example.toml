# staywake config — copy to ~/.config/staywake/config.toml

[daemon]
# How often (seconds) the daemon polls sources.
interval_seconds = 2.0

# A holder whose `updatedAt` is older than this is treated as dead.
# The Python context manager + library hold() refresh on every call,
# so 10 minutes is plenty of headroom for typical usage.
stale_after_seconds = 600

# Toggle `pmset disablesleep 1` while active. Required for
# "lid-close but keep running" — caffeinate alone doesn't block lid sleep.
# Only effective if the daemon runs as root (which the LaunchDaemon does).
aggressive = true


# Opt-in: also keep awake whenever certain processes are alive,
# even without an explicit `staywake hold`. Useful for tools you can't modify.
[process_scan]
enabled = false
patterns = [
    # "\\bcodex\\b",
    # "\\bclaude\\b",
]
# Subtree filter: a matched root counts as "idle" if all of its descendants
# match these patterns (use this to ignore language servers, dev servers, etc.).
idle_patterns = [
    # "language-server",
    # "tsc --watch",
]
